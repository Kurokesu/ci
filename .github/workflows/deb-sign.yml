name: Sign .deb bundles

# Bundles every build artifact of the calling run into per-artifact
# tarballs, writes SHA256SUMS, signs it with the archive key and
# verifies the signature against the published keyring. Uploads the
# result as the release-assets artifact.

on:
  workflow_call:
    secrets:
      ARCHIVE_GPG_SIGNING_KEY:
        description: ASCII-armored private signing key, passphrase-less
        required: true

permissions:
  contents: read

jobs:
  sign:
    name: Release assets
    runs-on: ubuntu-latest
    steps:
      # Inside a reusable workflow checkout defaults to the caller's
      # repo. The keyring for the self-check lives here, so pin this one.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          repository: Kurokesu/ci
          sparse-checkout: keys

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts/

      - name: Bundle assets
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p release-assets
          for dir in artifacts/*/; do
            # GitHub sanitizes release asset names, turning '~' into
            # '.', so mangle it to '_' like the packaging tag. Renaming
            # here keeps SHA256SUMS recording the published names.
            name=$(basename "$dir" | tr '~' '_')
            ( cd "$dir"
              files=( *.deb *.changes *.buildinfo )
              keep=()
              for f in "${files[@]}"; do
                [[ $f == *dbgsym* ]] || keep+=("$f")
              done
              [ "${#keep[@]}" -gt 0 ] \
                || { echo "::error::Nothing to bundle for ${name}."; exit 1; }
              tar -czf "${GITHUB_WORKSPACE}/release-assets/${name}.tar.gz" \
                -- "${keep[@]}"
            )
          done
          cd release-assets
          # Guard the glob: unmatched would make sha256sum read stdin.
          tarballs=( *.tar.gz )
          [ "${#tarballs[@]}" -gt 0 ] \
            || { echo "::error::No tarballs produced."; exit 1; }
          sha256sum -- "${tarballs[@]}" > SHA256SUMS
          ls -la

      - name: Sign SHA256SUMS
        env:
          ARCHIVE_GPG_SIGNING_KEY: ${{ secrets.ARCHIVE_GPG_SIGNING_KEY }}
        run: |
          set -euo pipefail
          GNUPGHOME=$(mktemp -d); export GNUPGHOME
          trap 'gpgconf --kill all 2>/dev/null || true; rm -rf "$GNUPGHOME"' EXIT

          # || true: an empty/garbage secret falls through to the
          # actionable assertion below instead of a bare gpg error.
          printf '%s' "$ARCHIVE_GPG_SIGNING_KEY" \
            | gpg --batch --quiet --no-greeting --import || true

          # || KEYIDS="" keeps the error below reachable under pipefail
          # when the import yielded no secret keys.
          KEYIDS=$(gpg --list-secret-keys --with-colons 2>/dev/null \
            | awk -F: '$1=="ssb" && $12~/s/ {print $5}') || KEYIDS=""
          [ -n "$KEYIDS" ] && [ "$(printf '%s\n' "$KEYIDS" | wc -l)" -eq 1 ] \
            || { echo "::error::Expected exactly one signing subkey; found: ${KEYIDS:-none}."; exit 1; }

          cd release-assets
          gpg --batch --yes --quiet --pinentry-mode loopback \
            --no-auto-key-locate --keyserver-options no-auto-key-retrieve \
            --local-user "$KEYIDS" \
            --detach-sign --armor SHA256SUMS

          # Independent check that the published keyring validates the signature.
          gpgv --keyring "${GITHUB_WORKSPACE}/keys/kurokesu-archive-keyring.gpg" \
            SHA256SUMS.asc SHA256SUMS

      - name: Upload signed release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets
          path: release-assets/
          if-no-files-found: error
          retention-days: 7
